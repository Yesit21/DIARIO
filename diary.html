<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestros Recuerdos de Amor - Entradas</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e91e63">
    
    <!-- Meta tags para iOS/Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mi Diario">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/833/833472.png">
</head>
<body class="diary-page">
    <div class="theme-toggle">
        <button id="themeToggleBtn" class="theme-toggle-btn" title="Cambiar modo">
            <span id="themeIcon">🌙</span>
        </button>
    </div>
    <header>
        <h1>💕 Nuestros Recuerdos de Amor 💕</h1>
        <div class="section-switcher">
            <button id="showRecuerdos" class="section-btn active">Recuerdos</button>
            <button id="showCuaderno" class="section-btn">📝 Cuaderno</button>
            <button id="showCalendario" class="section-btn">📅 Calendario</button>
            <button id="showAnhelos" class="section-btn">Mis Deseos</button>
        </div>
        <div class="header-controls">
            <button id="newEntryBtn" class="btn-primary">Nueva Entrada</button>
        </div>
    </header>

    <main class="diary-content">
        <div id="entryForm" class="entry-form hidden">
            <h2>Nueva Entrada</h2>
            <input type="text" id="entryTitle" placeholder="Título de la entrada" required>
            <div id="anhelosFields" class="hidden">
                <input type="number" id="entryPrice" placeholder="Precio (opcional)" step="0.01">
                <select id="entryStatus">
                    <option value="sin_adquirir">Sin adquirir</option>
                    <option value="adquirido">Adquirido</option>
                </select>
            </div>
            <textarea id="entryText" placeholder="Escribe aquí tus pensamientos..."></textarea>
            <input type="file" id="entryPhoto" accept="image/*" multiple>
            
            <div class="form-buttons">
                <button id="saveEntry" class="btn-primary">Guardar</button>
                <button id="cancelEntry" class="btn-secondary">Cancelar</button>
            </div>
        </div>

        <div id="entriesContainer" class="entries-container">
            <!-- Las entradas se mostrarán aquí -->
        </div>

        <!-- Cuaderno Estilo Snoopy -->
        <div id="cuadernoContainer" class="cuaderno-container hidden">
            <div class="cuaderno-page">
                <div class="cuaderno-header">
                    <div class="snoopy-decoration">🐾</div>
                    <h2 class="cuaderno-title">Mi Cuaderno Personal</h2>
                    <div class="snoopy-decoration">🐾</div>
                </div>
                
                <div class="cuaderno-info">
                    <span id="cuadernoDate"></span>
                    <span id="cuadernoWordCount">0 palabras</span>
                </div>
                
                <textarea 
                    id="cuadernoTextarea" 
                    class="cuaderno-textarea" 
                    placeholder="Querido diario...&#10;&#10;Escribe lo que quieras, sin límites. Este es tu espacio personal para expresar todo lo que sientes. 💭"
                ></textarea>
                
                <div class="cuaderno-footer">
                    <button id="saveCuaderno" class="btn-cuaderno">💾 Guardar</button>
                    <button id="clearCuaderno" class="btn-cuaderno-secondary">🗑️ Limpiar</button>
                </div>
                
                <!-- Snoopy caminando -->
                <div class="snoopy-walking-container">
                    <div class="snoopy-character">🐕</div>
                </div>
            </div>
        </div>

        <!-- Calendario -->
        <div id="calendarioContainer" class="calendario-container hidden">
            <div class="calendario-header">
                <button id="prevMonth" class="calendar-nav-btn">←</button>
                <h2 id="currentMonthYear"></h2>
                <button id="nextMonth" class="calendar-nav-btn">→</button>
            </div>
            
            <div id="calendarThemeMessage" class="calendar-theme-message hidden"></div>
            
            <div class="calendar-grid" id="calendarGrid"></div>
            
            <div class="calendar-legend">
                <span><span class="legend-dot" style="background: #e91e63;"></span> Examen</span>
                <span><span class="legend-dot" style="background: #9c27b0;"></span> Cumpleaños</span>
                <span><span class="legend-dot" style="background: #2196f3;"></span> Cita</span>
                <span><span class="legend-dot" style="background: #4caf50;"></span> Otro</span>
            </div>
            
            <button id="addEventBtn" class="btn-add-event">+ Agregar Evento</button>
            
            <div id="eventsList" class="events-list"></div>
        </div>

        <!-- Modal para agregar eventos -->
        <div id="eventModal" class="event-modal hidden">
            <div class="event-modal-content">
                <h3>Agregar Evento</h3>
                <input type="text" id="eventTitle" placeholder="Título del evento" required>
                <textarea id="eventDescription" placeholder="Descripción (opcional)"></textarea>
                <input type="date" id="eventDate" required>
                <select id="eventType">
                    <option value="examen">📚 Examen</option>
                    <option value="cumpleaños">🎂 Cumpleaños</option>
                    <option value="cita">📅 Cita</option>
                    <option value="otro">⭐ Otro</option>
                </select>
                <label>
                    <input type="checkbox" id="eventReminder" checked>
                    Recordarme 1 día antes
                </label>
                <div class="event-modal-buttons">
                    <button id="saveEvent" class="btn-primary">Guardar</button>
                    <button id="cancelEvent" class="btn-secondary">Cancelar</button>
                </div>
            </div>
        </div>
    </main>

    <script src="diary.js?v=5"></script>
    <script src="cursor-hearts.js"></script>
    <script>
        // Forzar actualización del Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', async () => {
                // Desregistrar service workers viejos
                const registrations = await navigator.serviceWorker.getRegistrations();
                for (let registration of registrations) {
                    await registration.unregister();
                    console.log('🧹 Service Worker antiguo desregistrado');
                }
                
                // Limpiar caches antiguos
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    for (let cacheName of cacheNames) {
                        if (cacheName.includes('diario-cache')) {
                            await caches.delete(cacheName);
                            console.log('🧹 Cache antiguo eliminado:', cacheName);
                        }
                    }
                }
                
                // Registrar nuevo service worker
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => {
                        console.log('✅ Service Worker v3 registrado');
                        reg.update(); // Forzar actualización inmediata
                    })
                    .catch(err => console.warn('❌ Error al registrar Service Worker', err));
            });
        }
    </script>
</body>
</html>
