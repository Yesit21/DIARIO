<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestros Recuerdos de Amor</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e91e63">
    
    <!-- Meta tags para iOS/Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mi Diario">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/833/833472.png">
</head>
<body>
    <div class="container">
        <div class="heart-container">
            <div class="heart" id="heart">
                <div class="lock" id="lock">
                    <div class="lock-body"></div>
                    <div class="lock-shackle"></div>
                    <div class="keyhole"></div>
                </div>
            </div>
            <div class="entrance-text">
                <h1>Nuestros Recuerdos Secretos</h1>
                <p>Haz clic en el corazón para entrar</p>
            </div>
        </div>
    </div>

    <!-- Modal de contraseña -->
    <div id="passwordModal" class="password-modal hidden">
        <div class="password-container">
            <h2>🔐 Ingresa la contraseña</h2>
            <p>Introduce los números para acceder a nuestro diario</p>
            <div class="password-inputs">
                <input type="number" class="password-digit" maxlength="1" min="0" max="9">
                <input type="number" class="password-digit" maxlength="1" min="0" max="9">
                <input type="number" class="password-digit" maxlength="1" min="0" max="9">
                <input type="number" class="password-digit" maxlength="1" min="0" max="9">
                <input type="number" class="password-digit" maxlength="1" min="0" max="9">
                <input type="number" class="password-digit" maxlength="1" min="0" max="9">
                <input type="number" class="password-digit" maxlength="1" min="0" max="9">
                <input type="number" class="password-digit" maxlength="1" min="0" max="9">
            </div>
            <div class="password-buttons">
                <button id="submitPassword" class="btn-primary">Entrar</button>
                <button id="cancelPassword" class="btn-secondary">Cancelar</button>
            </div>
            <div id="passwordError" class="password-error hidden">
                ❌ Contraseña incorrecta. Inténtalo de nuevo.
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
    <script src="cursor-hearts.js"></script>
    <script>
        // Forzar actualización del Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', async () => {
                // Desregistrar service workers viejos
                const registrations = await navigator.serviceWorker.getRegistrations();
                for (let registration of registrations) {
                    await registration.unregister();
                    console.log('🧹 Service Worker antiguo desregistrado');
                }
                
                // Limpiar caches antiguos
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    for (let cacheName of cacheNames) {
                        if (cacheName.includes('diario-cache')) {
                            await caches.delete(cacheName);
                            console.log('🧹 Cache antiguo eliminado:', cacheName);
                        }
                    }
                }
                
                // Registrar nuevo service worker
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => {
                        console.log('✅ Service Worker v3 registrado');
                        reg.update(); // Forzar actualización inmediata
                    })
                    .catch(err => console.warn('❌ Error al registrar Service Worker', err));
            });
        }
    </script>
</body>
</html>
